<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Arena - Leaderboard & Rank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="../site/icon-192.svg">
</head>
<body>

<div id="offline-popup"><i class="fas fa-wifi" style="text-decoration: line-through;"></i> No Internet Connection</div>
<div id="toast">Message</div>

<!-- PAGE TRANSITION LOADER -->
<div id="page-transition" class="page-transition-overlay">
    <div class="pt-logo">Arena</div>
    <div class="pt-spinner"></div>
</div>

<div id="auth-page" style="display:none;"></div>

<!-- MAIN APP CONTAINER -->
<div id="app-container" style="display:none;">
    
    <div class="header" style="padding: 15px 20px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="app-logo-header" style="width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--primary), #34aeff); display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:16px; box-shadow:0 2px 8px rgba(0,122,255,0.3);">
                <img id="header-app-logo-img" src="" alt="" style="width:100%; height:100%; border-radius:10px; object-fit:cover; display:none;">
                <span id="header-app-logo-text">A</span>
            </div>
            <div>
                <div id="header-app-name" style="font-size:17px; font-weight:800; color:var(--text-main); letter-spacing:-0.3px; line-height:1.1;">Arena Tournament</div>
                <div style="font-size:10px; color:var(--text-muted); font-weight:600;">Leaderboard & Rank</div>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="wallet-badge" onclick="navigateTo('wallet.html')" style="margin-right:0;"><i class="fas fa-wallet"></i> ₹<span id="header-bal">0</span></div>
            <div id="user-avatar-header" onclick="navigateTo('profile.html')" style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--primary), #34aeff); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.1);"></div>
        </div>
    </div>

    <div class="main-content">
        <div id="rank">
            <div id="rank-tournaments-list"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('home.html')"><i class="fas fa-home"></i>Home</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('matches.html')"><i class="fas fa-gamepad"></i>Matches</a>
        <a class="nav-item active" href="rank.html"><i class="fas fa-trophy"></i>Rank</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('wallet.html')"><i class="fas fa-wallet"></i>Wallet</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('profile.html')"><i class="fas fa-user"></i>Profile</a>
    </div>

</div>

<script src="common.js"></script>
<script src="rank.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW registered')).catch(err => console.log('SW failed'));
}
</script>
</body>
</html>
